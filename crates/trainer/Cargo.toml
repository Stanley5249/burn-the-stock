[package]
name = "trainer"
version = "0.1.0"
edition = "2024"

[dependencies]
stock-client = { path = "../stock-client" }

burn = {
  workspace = true,
  features = ["autotune", "flex", "fusion", "std", "train", "tui"]
}
chrono.workspace = true
clap = { workspace = true, features = ["derive"] }
fastrand = "2.4.1"
miette = { workspace = true, features = ["fancy"] }
polars = {
  workspace = true,
  features = [
    "concat_str",
    "dtype-array",
    "dtype-date",
    "lazy",
    "log",
    "parquet",
    "partition_by",
    "performant",
    "rolling_window",
    "strings"
  ]
}
tokio = { workspace = true, features = ["macros", "rt-multi-thread"] }
tracing.workspace = true
tracing-subscriber = { workspace = true, features = ["fmt", "std", "env-filter"] }

[features]
default = ["wgpu"]
wgpu = ["burn/wgpu"]

[lints]
workspace = true
